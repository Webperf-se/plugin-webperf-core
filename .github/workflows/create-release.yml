# https://github.com/softprops/action-gh-release
name: Create Release
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package.json"
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # behövs för GitHub Release-steget
      id-token: write   # behövs för npm OIDC (trusted publishing)
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # [!] we need to checkout with tags and commit history
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          architecture: "x64"
      - name: Setup dependencies using pip
        run: pip install -r requirements.txt
      - name: 📋 Get Commits since last Release
        id: changes
        uses: simbo/changes-since-last-release-action@v1.0.1
        with:
          line-prefix: "* "
          include-hashes: false
      - name: Generate new release version
        id: newversion
        run: python tools/release.py -l "${{ steps.changes.outputs.last-tag }}"
      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "${{ env.NEW_VERSION }}"
          make_latest: "true"
          generate_release_notes: true
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm (krävs för trusted publishing)
        run: npm install -g npm@latest
      - name: NPM Release
        run: npm publish
